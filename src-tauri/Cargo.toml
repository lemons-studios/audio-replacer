[package]
name = "audio-replacer"
version = "5.0.0"
description = "Streamline audio dubbing for video game mods"
authors = ["Lemon Studios"]
edition = "2024"

[lib]
name = "audio_replacer_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri-plugin-fs = "2"
tauri-plugin-shell = "2"
tauri-plugin-os = "2.2.1"
walkdir = "2.5.0"
